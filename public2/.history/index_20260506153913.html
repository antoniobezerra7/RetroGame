<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RetroGame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- HEADER -->
<header class="bg-dark text-white p-3 mb-4">
  <div class="container d-flex justify-content-between">
    <h2>🎮 RetroGame</h2>
    <nav>
      <a href="#" class="text-white me-3">Início</a>
      <a href="#colecoes" class="text-white">Coleções</a>
    </nav>
  </div>
</header>

<main class="container">

  <!-- CARROSSEL -->
  <h3 class="mb-3">🔥 Destaques</h3>

  <div id="carouselDestaques" class="carousel slide mb-5" data-bs-ride="carousel">
    <div class="carousel-indicators" id="carouselIndicators"></div>
    <div class="carousel-inner" id="carouselInner"></div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselDestaques" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselDestaques" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- CARDS -->
  <h3 id="colecoes" class="mb-3">📀 Coleção</h3>
  <div class="row" id="cardsContainer"></div>

</main>

<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT -->
<script src="script.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    initIndexPage();
  });
</script>

</body>
</html>
