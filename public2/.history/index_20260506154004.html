<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>RetroGame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSS CORRETO -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="site-header">
  <div class="container d-flex justify-content-between align-items-center py-2">
    <h2 class="site-title">RetroGame</h2>

    <nav class="nav-menu">
      <a href="#">Início</a>
      <a href="#colecoes">Coleções</a>
    </nav>
  </div>
</header>

<main class="container py-4">

  <!-- CARROSSEL -->
  <h3 class="section-title mb-3">🔥 Destaques</h3>

  <div id="carouselDestaques" class="carousel slide mb-5" data-bs-ride="carousel">
    <div class="carousel-indicators" id="carouselIndicators"></div>
    <div class="carousel-inner" id="carouselInner"></div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselDestaques" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselDestaques" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- CARDS -->
  <h3 id="colecoes" class="section-title mb-3">📀 Coleção</h3>
  <div class="row g-4" id="cardsContainer"></div>

</main>

<footer class="site-footer text-center py-4">
  <p>© 2026 RetroGame</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    initIndexPage();
  });
</script>

</body>
</html>
